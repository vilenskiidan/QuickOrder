<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order - QuickOrder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
    header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #f97316, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .cart-btn { background: #f97316; border: none; color: white; padding: 8px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .main { padding: 24px; max-width: 900px; margin: 0 auto; }
    h1 { font-size: 1.8rem; margin-bottom: 4px; }
    .subtitle { color: #64748b; margin-bottom: 32px; }
    .category-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 24px; }
    .cat-tab { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 6px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; transition: all 0.15s; }
    .cat-tab.active { background: #f97316; border-color: #f97316; color: white; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .menu-item { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; transition: all 0.2s; }
    .menu-item:hover { border-color: #f97316; }
    .item-emoji { font-size: 2.5rem; margin-bottom: 10px; }
    .item-name { font-weight: 600; margin-bottom: 4px; }
    .item-price { color: #f97316; font-weight: 700; margin-bottom: 14px; }
    .add-btn { background: #f97316; border: none; color: white; padding: 8px 0; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; font-size: 0.9rem; }
    .qty-ctrl { display: flex; align-items: center; gap: 0; width: 100%; }
    .qty-btn { background: #334155; border: none; color: white; padding: 8px 14px; cursor: pointer; font-size: 1rem; flex: 1; }
    .qty-btn:first-child { border-radius: 8px 0 0 8px; }
    .qty-btn:last-child { border-radius: 0 8px 8px 0; }
    .qty-num { flex: 2; background: #0f172a; color: #f97316; font-weight: 700; text-align: center; padding: 8px; }
    /* Cart sidebar */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 20; display: none; }
    .cart-sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 380px; max-width: 100vw; background: #1e293b; z-index: 30; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
    .cart-sidebar.open { transform: translateX(0); }
    .cart-header { padding: 20px 24px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
    .cart-header h2 { font-size: 1.1rem; }
    .close-cart { background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
    .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #0f172a; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 0.9rem; margin-bottom: 2px; }
    .cart-item-price { color: #f97316; font-size: 0.85rem; }
    .cart-item-qty { color: #94a3b8; font-size: 0.8rem; }
    .remove-item { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1rem; padding: 4px; }
    .cart-footer { padding: 20px 24px; border-top: 1px solid #334155; }
    .cart-total { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .name-input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-size: 0.9rem; margin-bottom: 10px; }
    .name-input:focus { outline: none; border-color: #f97316; }
    .order-btn { background: linear-gradient(135deg, #f97316, #ef4444); border: none; color: white; padding: 14px; border-radius: 10px; font-weight: 700; width: 100%; font-size: 1rem; cursor: pointer; }
    .order-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty-cart { text-align: center; padding: 40px 20px; color: #475569; }
    /* Success screen */
    .success { display: none; position: fixed; inset: 0; background: #0f172a; z-index: 50; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .success.show { display: flex; }
    .success-icon { font-size: 5rem; margin-bottom: 24px; animation: pop 0.5s cubic-bezier(0.68,-0.55,0.27,1.55); }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    .success h2 { font-size: 2rem; margin-bottom: 8px; }
    .success p { color: #64748b; margin-bottom: 32px; }
    .order-num { font-size: 1.5rem; font-weight: 800; color: #f97316; background: #1e293b; padding: 16px 32px; border-radius: 12px; margin-bottom: 32px; }
    .new-order-btn { background: #f97316; border: none; color: white; padding: 14px 32px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <header>
    <div class="logo">QuickOrder</div>
    <button class="cart-btn" onclick="openCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
  </header>

  <div class="main">
    <h1 id="rest-name">Loading...</h1>
    <p class="subtitle" id="rest-subtitle">Browse the menu and add items to your cart</p>

    <div class="category-tabs" id="cat-tabs"></div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <div class="cart-overlay" id="overlay" onclick="closeCart()"></div>
  <div class="cart-sidebar" id="cart">
    <div class="cart-header">
      <h2>Your Order</h2>
      <button class="close-cart" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cart-items-list">
      <div class="empty-cart">Your cart is empty</div>
    </div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total</span><span id="cart-total">$0.00</span></div>
      <input class="name-input" id="customer-name" type="text" placeholder="Your name" />
      <input class="name-input" id="order-note" type="text" placeholder="Special instructions (optional)" />
      <button class="order-btn" id="place-btn" onclick="placeOrder()">Place Order</button>
    </div>
  </div>

  <div class="success" id="success">
    <div class="success-icon">✅</div>
    <h2>Order Placed!</h2>
    <p>Your order has been sent to the kitchen</p>
    <div class="order-num" id="order-id-display"></div>
    <button class="new-order-btn" onclick="resetOrder()">Order More</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const restaurantId = params.get('r');
    if (!restaurantId) window.location.href = '/';

    let menu = [];
    let cart = {};
    let activeCategory = 'all';

    async function loadMenu() {
      const res = await fetch(`/api/restaurant/${restaurantId}`);
      if (!res.ok) { alert('Restaurant not found. Check the code.'); window.location.href = '/'; return; }
      const data = await res.json();
      menu = data.menu || [];
      document.getElementById('rest-name').textContent = data.name;
      document.title = `${data.name} - Order`;
      renderCategories();
      renderMenu();
    }

    function renderCategories() {
      const cats = ['All', ...new Set(menu.map(i => i.category))];
      document.getElementById('cat-tabs').innerHTML = cats.map(c =>
        `<button class="cat-tab ${c === 'All' ? 'active' : ''}" onclick="setCategory('${c}', this)">${c}</button>`
      ).join('');
    }

    function setCategory(cat, btn) {
      activeCategory = cat.toLowerCase();
      document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMenu();
    }

    function renderMenu() {
      const filtered = activeCategory === 'all' ? menu : menu.filter(i => i.category.toLowerCase() === activeCategory);
      document.getElementById('menu-grid').innerHTML = filtered.map(item => {
        const qty = cart[item.id]?.qty || 0;
        return `
          <div class="menu-item">
            <div class="item-emoji">${item.emoji || '🍽️'}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-price">$${item.price.toFixed(2)}</div>
            ${qty === 0
              ? `<button class="add-btn" onclick="addToCart(${item.id})">Add to cart</button>`
              : `<div class="qty-ctrl">
                  <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                  <span class="qty-num">${qty}</span>
                  <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                 </div>`}
          </div>`;
      }).join('');
    }

    function addToCart(id) {
      const item = menu.find(i => i.id === id);
      cart[id] = { ...item, qty: 1 };
      updateCart();
      renderMenu();
    }

    function changeQty(id, delta) {
      if (!cart[id]) return;
      cart[id].qty += delta;
      if (cart[id].qty <= 0) delete cart[id];
      updateCart();
      renderMenu();
    }

    function updateCart() {
      const items = Object.values(cart);
      const count = items.reduce((s, i) => s + i.qty, 0);
      const total = items.reduce((s, i) => s + i.price * i.qty, 0);
      document.getElementById('cart-count').textContent = count;
      document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;

      const list = document.getElementById('cart-items-list');
      if (!items.length) {
        list.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
        return;
      }
      list.innerHTML = items.map(item => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.emoji} ${item.name}</div>
            <div class="cart-item-qty">× ${item.qty}</div>
            <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
          </div>
          <button class="remove-item" onclick="changeQty(${item.id}, -${item.qty}); updateCart();">🗑</button>
        </div>`).join('');
    }

    function openCart() {
      document.getElementById('cart').classList.add('open');
      document.getElementById('overlay').style.display = 'block';
    }

    function closeCart() {
      document.getElementById('cart').classList.remove('open');
      document.getElementById('overlay').style.display = 'none';
    }

    async function placeOrder() {
      const items = Object.values(cart);
      if (!items.length) return alert('Your cart is empty');
      const name = document.getElementById('customer-name').value.trim() || 'Anonymous';
      const note = document.getElementById('order-note').value.trim();

      const btn = document.getElementById('place-btn');
      btn.disabled = true;
      btn.textContent = 'Placing order...';

      const res = await fetch(`/api/order/${restaurantId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: items.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty, emoji: i.emoji })), customerName: name, note })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('order-id-display').textContent = `Order #${data.orderId}`;
        document.getElementById('success').classList.add('show');
        closeCart();
      } else {
        alert('Failed to place order. Try again.');
        btn.disabled = false;
        btn.textContent = 'Place Order';
      }
    }

    function resetOrder() {
      cart = {};
      updateCart();
      renderMenu();
      document.getElementById('success').classList.remove('show');
      document.getElementById('customer-name').value = '';
      document.getElementById('order-note').value = '';
    }

    loadMenu();
  </script>
</body>
</html>
