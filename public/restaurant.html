<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Dashboard - QuickOrder</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
    header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #f97316, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .live-badge { display: flex; align-items: center; gap: 6px; color: #22c55e; font-size: 0.85rem; font-weight: 600; }
    .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .main { padding: 24px; max-width: 960px; margin: 0 auto; }
    .page-title { font-size: 1.6rem; margin-bottom: 4px; }
    .page-subtitle { color: #64748b; margin-bottom: 28px; font-size: 0.9rem; }
    .restaurant-code { display: inline-block; font-family: monospace; background: #1e293b; border: 1px solid #f97316; color: #f97316; padding: 3px 10px; border-radius: 6px; font-size: 0.85rem; letter-spacing: 1px; margin-left: 8px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 800; color: #f97316; }
    .stat-label { color: #64748b; font-size: 0.85rem; margin-top: 4px; }

    /* Two-column grid */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 680px) { .two-col { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(3,1fr); } }

    /* Panels */
    .panel { background: #1e293b; border-radius: 14px; padding: 24px; border: 1px solid #334155; }
    .panel-title { font-size: 1rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .panel-title span { color: #64748b; font-weight: 400; font-size: 0.85rem; }

    /* QR Code */
    .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #qr-canvas { background: white; padding: 12px; border-radius: 10px; }
    .share-url-row { display: flex; align-items: center; gap: 8px; width: 100%; }
    .share-url { font-family: monospace; font-size: 0.78rem; color: #94a3b8; background: #0f172a; padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn { background: #f97316; border: none; color: white; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
    .copy-btn:hover { opacity: 0.88; }

    /* Menu management */
    .add-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .form-row { display: flex; gap: 10px; }
    input, textarea { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-size: 0.9rem; font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: #f97316; }
    input::placeholder, textarea::placeholder { color: #475569; }
    textarea { resize: vertical; min-height: 64px; }
    .price-input { max-width: 110px; }
    .add-dish-btn { background: linear-gradient(135deg, #f97316, #ef4444); border: none; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.9rem; white-space: nowrap; }
    .add-dish-btn:hover { opacity: 0.88; }

    /* Dish list */
    .dish-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
    .dish-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; background: #0f172a; border-radius: 8px; padding: 12px 14px; border: 1px solid #334155; }
    .dish-info { flex: 1; min-width: 0; }
    .dish-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
    .dish-desc { color: #64748b; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dish-price { color: #f97316; font-size: 0.85rem; font-weight: 700; white-space: nowrap; margin-top: 2px; }
    .delete-dish { background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; padding: 2px 4px; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
    .delete-dish:hover { color: #ef4444; }
    .empty-menu { text-align: center; padding: 24px 0; color: #475569; font-size: 0.9rem; }

    /* Orders */
    .orders-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .orders-header h2 { font-size: 1.1rem; font-weight: 700; }
    .filter-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
    .filter-btn.active { background: #f97316; border-color: #f97316; color: white; }
    .orders-grid { display: grid; gap: 16px; }
    .order-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; animation: slideIn 0.3s ease; }
    .order-card.new { border-color: #f97316; box-shadow: 0 0 20px rgba(249,115,22,0.2); }
    .order-card.preparing { border-color: #3b82f6; }
    .order-card.done { border-color: #22c55e; opacity: 0.7; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .order-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .order-id { font-weight: 700; font-size: 1rem; }
    .order-time { color: #64748b; font-size: 0.8rem; }
    .order-customer { color: #94a3b8; font-size: 0.9rem; margin-bottom: 10px; }
    .order-items { list-style: none; margin-bottom: 12px; }
    .order-items li { padding: 4px 0; border-bottom: 1px solid #0f172a; font-size: 0.9rem; display: flex; justify-content: space-between; }
    .order-items li:last-child { border-bottom: none; }
    .order-note { background: #0f172a; border-radius: 6px; padding: 8px 12px; font-size: 0.85rem; color: #94a3b8; margin-bottom: 12px; }
    .order-total { font-weight: 700; text-align: right; color: #f97316; margin-bottom: 14px; }
    .status-btns { display: flex; gap: 8px; }
    .status-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
    .btn-prepare { background: #1d4ed8; color: white; }
    .btn-done { background: #15803d; color: white; }
    .btn-cancel { background: #7f1d1d; color: white; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge-new { background: rgba(249,115,22,0.2); color: #f97316; }
    .badge-preparing { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .badge-done { background: rgba(34,197,94,0.2); color: #22c55e; }
    .badge-cancelled { background: rgba(239,68,68,0.2); color: #ef4444; }
    .empty { text-align: center; padding: 60px 20px; color: #475569; }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .new-order-toast { position: fixed; top: 80px; right: 20px; background: #f97316; color: white; padding: 12px 20px; border-radius: 10px; font-weight: 700; z-index: 100; animation: toastIn 0.3s ease; display: none; }
    @keyframes toastIn { from { opacity:0; transform: translateX(50px); } to { opacity:1; transform: translateX(0); } }
  </style>
</head>
<body>
  <header>
    <div class="logo">QuickOrder</div>
    <div class="live-badge"><span class="dot"></span> LIVE</div>
  </header>

  <div class="main">
    <h1 class="page-title" id="rest-name">Loading...</h1>
    <p class="page-subtitle">Restaurant Dashboard — manage your menu and incoming orders</p>

    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total Orders</div></div>
      <div class="stat"><div class="stat-num" id="stat-active">0</div><div class="stat-label">Active</div></div>
      <div class="stat"><div class="stat-num" id="stat-revenue">$0</div><div class="stat-label">Revenue</div></div>
    </div>

    <div class="two-col">
      <!-- QR Code -->
      <div class="panel">
        <div class="panel-title">Customer QR Code <span>Scan to order</span></div>
        <div class="qr-wrap">
          <div id="qr-canvas"></div>
          <div class="share-url-row">
            <div class="share-url" id="share-url"></div>
            <button class="copy-btn" onclick="copyLink()">Copy</button>
          </div>
        </div>
      </div>

      <!-- Menu Management -->
      <div class="panel">
        <div class="panel-title">Menu <span id="dish-count">0 items</span></div>
        <div class="add-form">
          <input id="dish-name" type="text" placeholder="Dish name (e.g. Margherita Pizza)" maxlength="60" />
          <textarea id="dish-desc" placeholder="Description (e.g. Fresh tomato sauce, mozzarella, basil)" maxlength="120"></textarea>
          <div class="form-row">
            <input id="dish-price" type="number" class="price-input" placeholder="Price ($)" min="0" step="0.01" />
            <button class="add-dish-btn" onclick="addDish()">+ Add Dish</button>
          </div>
        </div>
        <div class="dish-list" id="dish-list">
          <div class="empty-menu">No dishes yet — add your first one above</div>
        </div>
      </div>
    </div>

    <!-- Orders -->
    <div class="orders-header">
      <h2>Orders</h2>
      <div style="display:flex;gap:8px;">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('new', this)">New</button>
        <button class="filter-btn" onclick="setFilter('preparing', this)">Preparing</button>
        <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
      </div>
    </div>
    <div class="orders-grid" id="orders-grid">
      <div class="empty"><div class="empty-icon">🔔</div><p>Waiting for orders...</p></div>
    </div>
  </div>

  <div class="new-order-toast" id="toast">🔔 New order!</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const restaurantId = params.get('id');
    if (!restaurantId) window.location.href = '/';

    const socket = io();
    let orders = [];
    let menu = [];
    let filter = 'all';

    const orderUrl = `${window.location.origin}/order.html?r=${restaurantId}`;
    document.getElementById('share-url').textContent = orderUrl;

    // Generate QR code
    new QRCode(document.getElementById('qr-canvas'), {
      text: orderUrl,
      width: 160,
      height: 160,
      colorDark: '#0f172a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    function copyLink() {
      navigator.clipboard.writeText(orderUrl);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    }

    async function loadRestaurant() {
      const res = await fetch(`/api/restaurant/${restaurantId}`);
      if (!res.ok) { alert('Restaurant not found'); window.location.href = '/'; return; }
      const data = await res.json();
      document.getElementById('rest-name').textContent = data.name;
      document.title = `${data.name} - Dashboard`;
      orders = data.orders || [];
      menu = data.menu || [];
      renderDishList();
      renderOrders();
    }

    socket.emit('join_restaurant', restaurantId);

    socket.on('new_order', (order) => {
      orders.unshift(order);
      renderOrders();
      showToast();
      if (Notification.permission === 'granted') {
        new Notification('New Order!', { body: `${order.customerName} placed an order`, icon: '/favicon.ico' });
      }
    });

    socket.on('order_updated', ({ orderId, status }) => {
      const o = orders.find(o => o.id === orderId);
      if (o) { o.status = status; renderOrders(); }
    });

    function showToast() {
      const t = document.getElementById('toast');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    // ---- Menu Management ----

    async function addDish() {
      const name = document.getElementById('dish-name').value.trim();
      const desc = document.getElementById('dish-desc').value.trim();
      const price = parseFloat(document.getElementById('dish-price').value) || 0;

      if (!name) {
        document.getElementById('dish-name').focus();
        document.getElementById('dish-name').style.borderColor = '#ef4444';
        setTimeout(() => document.getElementById('dish-name').style.borderColor = '', 1500);
        return;
      }

      const res = await fetch(`/api/restaurant/${restaurantId}/menu`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description: desc, price })
      });
      const item = await res.json();
      menu.push(item);
      renderDishList();

      // Clear form
      document.getElementById('dish-name').value = '';
      document.getElementById('dish-desc').value = '';
      document.getElementById('dish-price').value = '';
      document.getElementById('dish-name').focus();
    }

    async function deleteDish(itemId) {
      await fetch(`/api/restaurant/${restaurantId}/menu/${itemId}`, { method: 'DELETE' });
      menu = menu.filter(i => i.id !== itemId);
      renderDishList();
    }

    function renderDishList() {
      const list = document.getElementById('dish-list');
      document.getElementById('dish-count').textContent = `${menu.length} item${menu.length !== 1 ? 's' : ''}`;
      if (!menu.length) {
        list.innerHTML = '<div class="empty-menu">No dishes yet — add your first one above</div>';
        return;
      }
      list.innerHTML = menu.map(item => `
        <div class="dish-item">
          <div class="dish-info">
            <div class="dish-name">${escHtml(item.name)}</div>
            ${item.description ? `<div class="dish-desc">${escHtml(item.description)}</div>` : ''}
            <div class="dish-price">${item.price ? '$' + item.price.toFixed(2) : 'Free'}</div>
          </div>
          <button class="delete-dish" onclick="deleteDish(${item.id})" title="Remove dish">✕</button>
        </div>
      `).join('');
    }

    // Allow Enter on dish-name to jump to desc
    document.getElementById('dish-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('dish-desc').focus(); }
    });

    // ---- Orders ----

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderOrders();
    }

    function updateStats() {
      const total = orders.length;
      const active = orders.filter(o => o.status === 'new' || o.status === 'preparing').length;
      const revenue = orders.filter(o => o.status !== 'cancelled').reduce((sum, o) => {
        return sum + (o.items || []).reduce((s, i) => s + (i.price * i.qty), 0);
      }, 0);
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-active').textContent = active;
      document.getElementById('stat-revenue').textContent = `$${revenue.toFixed(2)}`;
    }

    function renderOrders() {
      updateStats();
      const grid = document.getElementById('orders-grid');
      const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">🔔</div><p>${filter === 'all' ? 'Waiting for orders...' : 'No ' + filter + ' orders'}</p></div>`;
        return;
      }
      grid.innerHTML = filtered.map(order => {
        const total = (order.items || []).reduce((s, i) => s + i.price * i.qty, 0);
        const time = new Date(order.timestamp).toLocaleTimeString();
        return `
          <div class="order-card ${order.status}" id="card-${order.id}">
            <div class="order-top">
              <span class="order-id">#${order.id}</span>
              <span class="status-badge badge-${order.status}">${order.status}</span>
              <span class="order-time">${time}</span>
            </div>
            <div class="order-customer">👤 ${escHtml(order.customerName)}</div>
            <ul class="order-items">
              ${(order.items || []).map(i => `<li><span>${escHtml(i.name)} × ${i.qty}</span><span>$${(i.price * i.qty).toFixed(2)}</span></li>`).join('')}
            </ul>
            ${order.note ? `<div class="order-note">📝 ${escHtml(order.note)}</div>` : ''}
            <div class="order-total">Total: $${total.toFixed(2)}</div>
            ${order.status !== 'done' && order.status !== 'cancelled' ? `
              <div class="status-btns">
                ${order.status === 'new' ? `<button class="status-btn btn-prepare" onclick="updateStatus('${order.id}', 'preparing')">🍳 Preparing</button>` : ''}
                ${order.status === 'preparing' ? `<button class="status-btn btn-done" onclick="updateStatus('${order.id}', 'done')">✅ Done</button>` : ''}
                <button class="status-btn btn-cancel" onclick="updateStatus('${order.id}', 'cancelled')">✕ Cancel</button>
              </div>` : ''}
          </div>`;
      }).join('');
    }

    function updateStatus(orderId, status) {
      socket.emit('update_order_status', { restaurantId, orderId, status });
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    if (Notification.permission === 'default') Notification.requestPermission();

    loadRestaurant();
  </script>
</body>
</html>
